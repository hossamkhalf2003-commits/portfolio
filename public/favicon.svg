<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Gradient matching your Aurora theme -->
    <linearGradient id="neonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F0FF" /> <!-- Cyan -->
      <stop offset="100%" stop-color="#A78BFA" /> <!-- Violet -->
    </linearGradient>
  </defs>
  
  <!-- Dark surface background -->
  <rect width="100" height="100" rx="24" fill="#0B1221" />
  
  <!-- The Letter H -->
  <path 
    d="M32 25 V75 M68 25 V75 M32 50 H68" 
    stroke="url(#neonGradient)" 
    stroke-width="12" 
    stroke-linecap="round" 
    stroke-linejoin="round" 
  />
</svg>
